<router-outlet />

<div id="notifications">
    @for (notification of notifService.notifications; track $index) {
        <app-notification [type]="notification.type" [message]="notification.message" [id]="notification.id"
            (remove)="onRemoveNotif($event)"></app-notification>
    }
</div>

@if (modalService.open) {
    <app-modal></app-modal>
}

<snk-dialogs></snk-dialogs>
